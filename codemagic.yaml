workflows:
ios-app-store:
name: Infer PHR iOS

```
instance_type: mac_mini_m2

max_build_duration: 60

environment:
  flutter: stable
  xcode: latest

scripts:
  - name: Flutter Clean
    script: |
      flutter clean
      flutter pub get

  - name: Update CocoaPods
    script: |
      sudo gem install cocoapods
      pod repo update

  - name: Install Pods
    script: |
      cd ios
      rm -rf Pods
      rm -rf Podfile.lock
      pod deintegrate
      pod install --repo-update
      cd ..

  - name: Build IPA
    script: |
      flutter build ipa --release

artifacts:
  - build/ios/ipa/*.ipa

publishing:
  email:
    recipients:
      - your@email.com
```
